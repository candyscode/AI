name: Deploy to Staging VPS

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
  push:
    branches-ignore:
      - main
      - build-docker

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Test SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "echo 'SSH OK'"

      - name: Clone repo on VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cd ~ && 
            [ ! -d 'knx-viz' ] && git clone https://github.com/candyscode/AI.git knx-viz || echo 'Repo exists'
          "

      - name: Checkout branch
        run: |
          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cd ~/knx-viz &&
            git fetch origin &&
            git checkout $BRANCH &&
            git pull origin $BRANCH
          "

      - name: Deploy with Docker Compose
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cd ~/knx-viz &&
            docker compose -f docker-compose.staging.yml down 2>/dev/null || true &&
            docker compose -f docker-compose.staging.yml up -d --build
          "

      - name: Notify success
        run: |
          echo "✅ Staging deployed!"
          echo "🌐 http://${{ secrets.VPS_HOST }}:8080"
