name: Deploy to Staging VPS

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
  push:
    branches-ignore:
      - main
      - build-docker

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy to VPS
        run: |
          set -ex
          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          echo "=== Starting deploy for branch: $BRANCH ==="
          
          # Test SSH connection
          echo "=== Testing SSH connection ==="
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "echo 'SSH OK'"
          
          # Clone repo if needed
          echo "=== Ensuring repo exists ==="
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "cd ~ && [ -d 'knx-viz' ] || git clone https://github.com/candyscode/AI.git knx-viz"
          
          # Update code
          echo "=== Updating code ==="
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "cd ~/knx-viz && git fetch origin && git checkout $BRANCH && git pull origin $BRANCH"
          
          # Deploy
          echo "=== Deploying with Docker ==="
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "cd ~/knx-viz && docker compose -f docker-compose.staging.yml down 2>/dev/null || true && docker compose -f docker-compose.staging.yml up -d --build"
          
          echo "=== Deploy complete ==="
          echo "URL: http://${{ secrets.VPS_HOST }}:8080"
