name: Deploy to Staging VPS

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
  push:
    branches-ignore:
      - main
      - build-docker

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "Known hosts added for ${{ secrets.VPS_HOST }}"

      - name: Deploy to VPS
        run: |
          set -e
          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          echo "Deploying branch: $BRANCH"
          echo "Host: ${{ secrets.VPS_HOST }}"
          echo "User: ${{ secrets.VPS_USER }}"
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e
            echo 'SSH connected successfully'
            cd ~
            if [ ! -d 'knx-viz' ]; then
              echo 'Cloning repository...'
              git clone https://github.com/candyscode/AI.git knx-viz
            fi
            cd knx-viz
            echo 'Fetching latest changes...'
            git fetch origin
            echo 'Checking out branch: $BRANCH'
            git checkout $BRANCH
            echo 'Pulling latest changes...'
            git pull origin $BRANCH
            echo 'Stopping existing containers...'
            docker compose -f docker-compose.staging.yml down 2>/dev/null || true
            echo 'Building and starting containers...'
            docker compose -f docker-compose.staging.yml up -d --build
            echo 'Deployment complete!'
          "
        env:
          SSH_AUTH_SOCK: ${{ env.SSH_AUTH_SOCK }}

      - name: Notify success
        run: |
          echo "✅ Staging deployed successfully!"
          echo "🌐 URL: http://${{ secrets.VPS_HOST }}:8080"
