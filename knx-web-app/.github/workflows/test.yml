name: Tests

# Runs on:
#   - Any push to main (direct commits, merged PRs)
#   - Any pull_request — regardless of which branch is the base
#     This means your tests run the moment you open or update a PR.
#
# Path filter: only triggers when files inside knx-web-app/ change,
# so unrelated commits elsewhere in the candyscode/AI monorepo are ignored.

on:
  push:
    branches: ['**']
    paths:
      - 'knx-web-app/**'
  pull_request:
    paths:
      - 'knx-web-app/**'

defaults:
  run:
    # All steps run relative to the project root inside the monorepo
    working-directory: knx-web-app

jobs:
  backend-tests:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: knx-web-app/backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: knx-web-app/backend

      - name: Run backend tests
        run: npm test
        working-directory: knx-web-app/backend

  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: knx-web-app/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: knx-web-app/frontend

      - name: Run frontend tests
        run: npm test
        working-directory: knx-web-app/frontend
